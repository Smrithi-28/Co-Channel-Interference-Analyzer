{% extends "layout.html" %}

{% block content %}

<h1>🤖 Co-Channel Interference Chatbot</h1>

<!-- Chat input form -->
<form method="POST" class="card" style="display:flex; gap:10px; flex-wrap: wrap; margin-bottom:20px;">
    <input type="text" name="message" placeholder="Ask something about CCI..." required style="flex:1; padding:8px; font-size:1rem;">
    <button type="submit" style="padding:8px 16px; font-size:1rem;">Send</button>
</form>

<!-- Display chat response -->
{% if reply %}
<div class="card" style="padding:10px; background-color:#f1f1f1; margin-bottom:10px;">
    <p><b>You:</b> {{ request.form['message'] }}</p>
    <p><b>Bot:</b> {{ reply }}</p>
</div>
{% endif %}

{% endblock %}
